<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bora pro terceiro encontro? 💚</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100%;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    color: #ffe9f2;
    /* fundo mais romântico: rosé profundo + brilhos quentes + um toque de verde shrek */
    background:
      radial-gradient(1100px 780px at 24% 14%, rgba(255,150,200,0.38), transparent 60%),
      radial-gradient(1000px 880px at 86% 82%, rgba(255,70,120,0.30), transparent 55%),
      radial-gradient(820px 640px at 70% 24%, rgba(120,205,90,0.12), transparent 60%),
      linear-gradient(160deg, #521235 0%, #6d1642 42%, #380c26 100%);
  }

  /* camada dos corações (atrás de tudo, não captura cliques) */
  .hearts { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .h {
    position: absolute;
    bottom: 0;
    font-size: 28px;
    line-height: 1;
    will-change: transform, opacity;
    animation: drift linear infinite;
    filter: drop-shadow(0 0 6px currentColor);
  }
  /* voa na diagonal (sobe indo pra direita), girando de leve */
  @keyframes drift {
    0%   { transform: translate3d(0, 8vh, 0) rotate(var(--rot)) scale(var(--s)); opacity: 0; }
    10%  { opacity: var(--op); }
    88%  { opacity: var(--op); }
    100% { transform: translate3d(var(--dx), -118vh, 0) rotate(calc(var(--rot) + 45deg)) scale(var(--s)); opacity: 0; }
  }

  /* vinheta suave pra dar clima */
  .vignette { position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(120% 90% at 50% 45%, transparent 55%, rgba(20,4,14,0.55) 100%); }

  /* painel dos botões — NA FRENTE dos corações */
  .stage { position: relative; z-index: 3; text-align: center; padding: 24px; }
  .card {
    background: rgba(70,20,50,0.42);
    border: 1px solid rgba(255,170,205,0.35);
    border-radius: 28px;
    padding: 40px 46px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.45), 0 0 60px rgba(255,90,150,0.20), inset 0 0 0 1px rgba(255,255,255,0.05);
    backdrop-filter: blur(9px); -webkit-backdrop-filter: blur(9px);
    max-width: 620px;
  }
  .kicker { font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color:#ffbcd8; opacity:.85; margin:0 0 10px; }
  .headline { font-size: clamp(28px, 5vw, 46px); font-weight: 800; line-height: 1.1; margin: 0 0 8px; color:#fff; text-shadow: 0 2px 20px rgba(255,60,120,.35); }
  .sub { font-size: 16px; color:#ffd9ea; margin: 6px 0 30px; font-style: italic; }
  .btns { display:flex; gap:18px; justify-content:center; align-items:center; flex-wrap:wrap; }
  button { font-family: inherit; font-weight: 800; border:none; cursor:pointer; border-radius:16px; transition: transform .18s, box-shadow .2s; }
  .sim {
    background: linear-gradient(135deg,#ff5a9e,#ff2748); color:#fff; font-size:20px; padding:16px 40px;
    box-shadow: 0 10px 28px rgba(255,50,100,.5); animation: glow 2.2s ease-in-out infinite;
  }
  @keyframes glow { 0%,100%{box-shadow:0 8px 22px rgba(255,50,100,.45);} 50%{box-shadow:0 12px 40px rgba(255,50,100,.85);} }
  .sim:hover { transform: scale(1.06) translateY(-2px); }
  .nao { background:#e7d6df; color:#6b4a5c; font-size:16px; padding:13px 26px; box-shadow:0 6px 16px rgba(0,0,0,.24); }
  /* tremida antes de virar "Sim" */
  .shake { animation: shake .45s ease-in-out; }
  @keyframes shake {
    0%,100%{ transform: translateX(0) rotate(0); }
    20%{ transform: translateX(-4px) rotate(-3deg); }
    40%{ transform: translateX(4px) rotate(3deg); }
    60%{ transform: translateX(-3px) rotate(-2deg); }
    80%{ transform: translateX(3px) rotate(2deg); }
  }
  /* os dois "Sim" deslizam pro centro e se fundem */
  .combine-move { transition: transform .5s cubic-bezier(.4,0,.2,1), opacity .45s ease; }
  .mega {
    font-size: 30px; padding: 22px 66px;
    animation: megapop .55s cubic-bezier(.2,1.5,.4,1) both;
  }
  @keyframes megapop {
    0%{ transform: scale(.2); opacity:0; }
    60%{ transform: scale(1.16); }
    100%{ transform: scale(1); opacity:1; }
  }
  /* clique no "Sim" gigante: cresce mais antes de virar a página */
  .grow { animation: grow .42s cubic-bezier(.2,1.6,.4,1) forwards; }
  @keyframes grow { to { transform: scale(1.5); } }
  .cheer { font-size: 54px; margin: 0 0 6px; animation: megapop .5s cubic-bezier(.2,1.5,.4,1) both; }

  /* tela de planejamento (próximo passo) */
  .plan-h { font-size: 23px; font-weight:800; color:#fff; margin: 4px 0 18px; line-height:1.25; }
  .locais { display:flex; flex-direction:column; gap:10px; margin: 0 0 14px; text-align:left; }
  .loc {
    background: rgba(255,255,255,.10); color:#fff; border:1px solid rgba(255,170,205,.35);
    padding:14px 16px; font-size:15.5px; border-radius:14px; cursor:pointer;
    transition: transform .15s, background .15s;
  }
  .loc small { display:block; font-size:12px; opacity:.8; font-weight:400; margin-top:3px; font-style:italic; }
  .loc:hover { background: rgba(255,255,255,.18); transform: translateY(-1px); }
  .loc.selected { background: linear-gradient(135deg,#ff5a9e,#ff2748); border-color:transparent; box-shadow:0 6px 16px rgba(255,60,120,.4); }
  .ideia-input {
    width:100%; font-family:inherit; font-size:15px; padding:12px 14px; margin: 0 0 14px;
    border-radius:12px; border:1px solid rgba(255,170,205,.45);
    background: rgba(255,255,255,.12); color:#fff;
  }
  .ideia-input::placeholder { color:#ffc4dd; opacity:.7; }
  .datarow { display:flex; flex-wrap:wrap; gap:10px 20px; justify-content:center; align-items:center; margin: 4px 0 0; font-size:15px; color:#ffd9ea; }
  .datarow input {
    font-family:inherit; font-size:16px; width:104px; text-align:center;
    padding:10px 12px; border-radius:12px; border:1px solid rgba(255,170,205,.45);
    background: rgba(255,255,255,.12); color:#fff; margin-left:8px;
  }
  .datarow input::placeholder { color:#ffc4dd; opacity:.7; }
  /* mensagem fofa da data — pílula rosa com brilho pulsante */
  .nudge {
    display:inline-block; margin: 16px 0 0; padding: 9px 18px;
    font-weight:800; color:#fff; font-size:15px;
    background: linear-gradient(135deg,#ff6aa6,#ff2748); border-radius: 999px;
    box-shadow: 0 8px 20px rgba(255,60,120,.35);
    opacity:0; transform: translateY(6px) scale(.92); transition: opacity .3s ease, transform .3s ease; pointer-events:none;
  }
  .nudge.show { opacity:1; transform: translateY(0) scale(1); animation: nudgePulse 1.9s ease-in-out .3s infinite; }
  @keyframes nudgePulse { 0%,100%{ box-shadow:0 8px 20px rgba(255,60,120,.35);} 50%{ box-shadow:0 12px 32px rgba(255,60,120,.72);} }
  .reset { display:inline-block; margin-top:18px; color:#ffb8d5; font-size:12.5px; opacity:.65; cursor:pointer; background:none; border:none; text-decoration:underline; }
  .confirmar { margin: 6px 0 2px; }
  .form-erro { min-height:18px; margin:10px 0 6px; color:#ffe08a; font-size:14px; font-weight:700; }
  .msg-final {
    width:100%; min-height:130px; font-family:inherit; font-size:14.5px; line-height:1.55;
    padding:14px 16px; border-radius:14px; border:1px solid rgba(255,170,205,.4);
    background: rgba(255,255,255,.12); color:#fff; resize:none; margin: 4px 0 16px;
  }

  /* tela 0: senha — trecho da música "Dani", a senha completa o verso */
  .lyric { font-size: 23px; font-style: italic; line-height: 1.6; color:#ffe4f0; margin: 10px 0 16px; text-shadow: 0 2px 16px rgba(255,60,120,.3); }
  .lyric-fill { display:flex; flex-wrap:wrap; gap:8px; align-items:baseline; justify-content:center; font-size:23px; font-style:italic; color:#ffe4f0; margin: 0 0 22px; }
  .lyric-fill input {
    font-family:inherit; font-size:23px; font-style:italic; text-align:center; color:#fff;
    background:transparent; border:none; border-bottom:2px solid rgba(255,150,200,.75);
    padding:2px 8px; width:180px; outline:none; caret-color:#ff9ac2;
  }
  .lyric-fill input::placeholder { color:#ffb4d4; opacity:.55; }
  .lyric-go { margin-top: 2px; }
  .senha-erro { min-height:18px; margin:12px 0 0; color:#ffd3e6; font-size:14px; font-weight:700; }

  .tag { position: fixed; left: 0; right: 0; bottom: 14px; z-index: 4; text-align:center;
    font-size: 12.5px; color:#ffd0e4; opacity:.75; pointer-events:none; }

  /* botão de mute da música */
  #muteBtn { position: fixed; top: 16px; right: 18px; z-index: 8;
    background: rgba(72,32,58,.55); border: 1px solid rgba(255,170,205,.4); color:#fff;
    font-size: 18px; width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); transition: background .15s; }
  #muteBtn:hover { background: rgba(72,32,58,.85); }
</style>
</head>
<body>
  <!-- player de música (YouTube, escondido) + botão de mute -->
  <div id="yt" style="position:fixed;width:1px;height:1px;left:-9999px;top:-9999px;opacity:0;pointer-events:none;"></div>
  <button id="muteBtn" onclick="toggleMute()" aria-label="mutar/desmutar">🔊</button>

  <div class="hearts" id="hearts"></div>
  <div class="vignette"></div>

  <!-- tela 0: senha (a senha é "Daniela") -->
  <div class="stage" id="lockScreen">
    <div class="card">
      <p class="lyric">só penso nela…<br>quem é ela?</p>
      <div class="lyric-fill">
        <span>o nome dela é</span>
        <input id="senha" type="text" autocomplete="off" placeholder="…?"
               onkeydown="if(event.key==='Enter'){ checarSenha(); }">
      </div>
      <button class="sim lyric-go" onclick="checarSenha()">entrar 💗</button>
      <p class="senha-erro" id="senhaErro"></p>
    </div>
  </div>

  <div class="stage" id="askScreen" style="display:none;">
    <div class="card">
      <p class="kicker">terceiro encontro</p>
      <h1 class="headline">Bora pro terceiro encontro? 💚</h1>
      <p class="sub">😏</p>
      <div class="btns" id="btns">
        <button class="sim" id="sim">Sim 💗</button>
        <button class="nao" id="nao">não</button>
      </div>
    </div>
  </div>

  <!-- próximo passo: escolher lugar + data (com a pegadinha da data) -->
  <div class="stage" id="revealScreen" style="display:none;">
    <div class="card">
      <div class="cheer">💚🎉</div>
      <h1 class="plan-h">Ebaa! Então… pra onde a gente vai?</h1>
      <div class="locais" id="locais">
        <button class="loc" onclick="escolherLocal(this, event)">🍨 La Gelateria + caminhada de leve</button>
        <button class="loc" onclick="escolherLocal(this, event)">🎬 Cineminha no Kinoplex Diamante</button>
        <button class="loc" onclick="escolherLocal(this, event)">🏐 Uma aula de vôlei de areia</button>
        <button class="loc" onclick="escolherLocal(this, event)">🍷 1 taça de vinho em casa</button>
        <button class="loc" data-outros="1" onclick="escolherLocal(this, event)">💡 Outros <small>(uma ajudinha de uma jooseense NATA é mais que bem vinda)</small></button>
      </div>
      <div id="ideaWrap" style="display:none;">
        <input id="ideia" class="ideia-input" placeholder="manda sua ideia aqui 💭">
      </div>
      <div class="datarow">
        <span>Que dia? <input id="data" inputmode="numeric" maxlength="5" placeholder="DD/MM" oninput="fmtData(this); checarData();"></span>
        <span>Que horas? <input id="hora" inputmode="numeric" maxlength="5" placeholder="HH:MM" oninput="fmtHora(this)"></span>
      </div>
      <p class="nudge" id="nudge">Certeza que não quer antes?? 🥺 S2</p>
      <p class="form-erro" id="formErro"></p>
      <button class="sim confirmar" onclick="finalizar()">tá, combinado! 💚</button>
    </div>
  </div>

  <!-- tela final: mensagem pronta pra copiar -->
  <div class="stage" id="sucessoScreen" style="display:none;">
    <div class="card">
      <div class="cheer">🥳💚</div>
      <h1 class="plan-h">Tá marcado!</h1>
      <p class="sub">agora é só copiar e me mandar 👇</p>
      <textarea id="mensagem" class="msg-final" readonly></textarea>
      <button class="sim" id="btnCopiar" onclick="copiarMsg()">copiar mensagem 💗</button>
    </div>
  </div>


<script>
  // rosa, vermelho, verde
  const cores = ['#ff6fae', '#ff2e5e', '#7ac943', '#ff9ac2', '#e01e4f', '#57c33b'];
  const glifos = ['♥', '❤', '💚', '💕']; // ♥ ❤ 💚 💕
  const camada = document.getElementById('hearts');
  const N = 52;
  // pseudo-aleatório simples (sem depender de nada externo)
  function r(min, max){ return min + Math.random() * (max - min); }
  function pick(a){ return a[Math.floor(Math.random() * a.length)]; }

  for (let i = 0; i < N; i++) {
    const el = document.createElement('span');
    el.className = 'h';
    const usarEmoji = Math.random() < 0.35;
    if (usarEmoji) {
      el.textContent = pick(['💚', '💕', '❤️']);
    } else {
      el.textContent = '♥';
      el.style.color = pick(cores);
    }
    el.style.left = r(-6, 100) + '%';
    el.style.fontSize = r(14, 46) + 'px';
    el.style.setProperty('--dx', r(16, 52) + 'vw');   // deslize horizontal → diagonal
    el.style.setProperty('--rot', r(-25, 25) + 'deg');
    el.style.setProperty('--s', r(0.6, 1.35).toFixed(2));
    el.style.setProperty('--op', r(0.5, 0.95).toFixed(2));
    el.style.animationDuration = r(7, 15).toFixed(1) + 's';
    el.style.animationDelay = (-r(0, 15)).toFixed(1) + 's'; // começa no meio do voo
    camada.appendChild(el);
  }

  // brincadeira: o "não" treme, vira "Sim", e aí os dois "Sim" se fundem num só
  const nao = document.getElementById('nao');
  const sim = document.getElementById('sim');
  const btns = document.getElementById('btns');
  let morphed = false;

  function virarSim(){
    if (morphed) return;
    morphed = true;
    nao.classList.add('shake');
    nao.textContent = 'nã~o…';
    setTimeout(function(){
      nao.classList.remove('shake', 'nao');
      nao.classList.add('sim');
      nao.textContent = 'Sim 💗';
      setTimeout(combinar, 560); // pausa pra registrar "agora são dois Sim"
    }, 450);
  }

  function combinar(){
    sim.classList.add('combine-move');
    nao.classList.add('combine-move');
    sim.style.transform = 'translateX(72%) scale(.92)';
    nao.style.transform = 'translateX(-72%) scale(.92)';
    sim.style.opacity = '.25';
    nao.style.opacity = '.25';
    setTimeout(function(){
      sim.remove();
      nao.remove();
      const mega = document.createElement('button');
      mega.className = 'sim mega';
      mega.textContent = 'Sim 💗';
      btns.appendChild(mega);
      const rect = btns.getBoundingClientRect();
      burstHearts(rect.left + rect.width / 2, rect.top + rect.height / 2);
      // clicar no "Sim" gigante: cresce mais e libera a próxima página
      let indo = false;
      mega.addEventListener('click', function(){
        if (indo) return;
        indo = true;
        mega.classList.add('grow');
        setTimeout(liberarProxima, 420);
      });
    }, 520);
  }

  function liberarProxima(){
    const ask = document.getElementById('askScreen');
    ask.style.transition = 'opacity .4s ease, transform .4s ease';
    ask.style.opacity = '0';
    ask.style.transform = 'scale(1.12)';
    setTimeout(function(){
      ask.style.display = 'none';
      const rv = document.getElementById('revealScreen');
      rv.style.display = 'block';
      rv.style.opacity = '0';
      requestAnimationFrame(function(){
        rv.style.transition = 'opacity .5s ease';
        rv.style.opacity = '1';
      });
      burstHearts(window.innerWidth / 2, window.innerHeight * 0.42);
    }, 420);
  }

  function burstHearts(cx, cy, n){
    if (cx == null) { cx = window.innerWidth / 2; cy = window.innerHeight / 2; }
    n = n || 22;
    for (let i = 0; i < n; i++) {
      const s = document.createElement('span');
      s.textContent = pick(['💗', '❤️', '💚', '💖', '💕']);
      s.style.cssText = 'position:fixed;z-index:6;pointer-events:none;left:' + cx + 'px;top:' + cy + 'px;font-size:' + r(20, 44).toFixed(0) + 'px;filter:drop-shadow(0 0 9px rgba(255,90,150,.85));will-change:transform,opacity;';
      document.body.appendChild(s);
      const ang = Math.random() * Math.PI * 2;
      const dist = r(90, 240);
      const dx = Math.cos(ang) * dist;
      const dy = Math.sin(ang) * dist;
      const rot = r(-50, 50).toFixed(0);
      s.animate([
        { transform: 'translate(-50%,-50%) scale(.25) rotate(0deg)', opacity: 1 },
        { transform: 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px)) scale(1.55) rotate(' + rot + 'deg)', opacity: 0 }
      ], { duration: r(950, 1350), easing: 'cubic-bezier(.15,.7,.3,1)' });
      setTimeout(function(){ s.remove(); }, 1400);
    }
  }

  nao.addEventListener('mouseenter', virarSim);
  nao.addEventListener('click', virarSim); // toque no celular também morfa

  // ---- próximo passo: escolher lugar + data ----
  let localEscolhido = null;
  window.escolherLocal = function(btn, ev){
    document.querySelectorAll('#locais .loc').forEach(function(b){ b.classList.remove('selected'); });
    btn.classList.add('selected');
    localEscolhido = btn.textContent.trim();
    document.getElementById('ideaWrap').style.display = btn.dataset.outros ? 'block' : 'none';
    // efeito de coração no ponto do clique
    const rect = btn.getBoundingClientRect();
    burstHearts(ev ? ev.clientX : rect.left + rect.width / 2,
                ev ? ev.clientY : rect.top + rect.height / 2, 18);
  };
  window.fmtHora = function(c){
    let v = c.value.replace(/\D/g, '');
    if (v.length > 2) v = v.slice(0, 2) + ':' + v.slice(2, 4);
    c.value = v;
  };
  window.fmtData = function(c){
    let v = c.value.replace(/\D/g, '');
    if (v.length > 2) v = v.slice(0, 2) + '/' + v.slice(2, 4);
    c.value = v;
  };
  // pegadinha: se escolher data DEPOIS de hoje, aparece "Certeza que não quer antes?? S2"
  window.checarData = function(){
    const nudge = document.getElementById('nudge');
    const m = document.getElementById('data').value.trim().match(/^(\d{2})\/(\d{2})$/);
    if (!m) { nudge.classList.remove('show'); return; }
    const dia = +m[1], mes = +m[2];
    if (mes < 1 || mes > 12 || dia < 1 || dia > 31) { nudge.classList.remove('show'); return; }
    const agora = new Date();
    const hoje = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate());
    const escolhida = new Date(agora.getFullYear(), mes - 1, dia);
    nudge.classList.toggle('show', escolhida > hoje);
  };

  // ---- tela final: gerar a mensagem pra copiar ----
  function dataValida(s){ const m = s.match(/^(\d{2})\/(\d{2})$/); if(!m) return false; const d=+m[1], mo=+m[2]; return d>=1 && d<=31 && mo>=1 && mo<=12; }
  function horaValida(s){ const m = s.match(/^(\d{2}):(\d{2})$/); if(!m) return false; const h=+m[1], mi=+m[2]; return h>=0 && h<=23 && mi>=0 && mi<=59; }

  window.finalizar = function(){
    const data = document.getElementById('data').value.trim();
    const hora = document.getElementById('hora').value.trim();
    const ideiaEl = document.getElementById('ideia');
    const ideia = ideiaEl ? ideiaEl.value.trim() : '';
    const erro = document.getElementById('formErro'); erro.textContent = '';
    const temLugar = localEscolhido && !/Outros/i.test(localEscolhido);
    if (!temLugar && !ideia) { erro.textContent = 'Escolhe um lugar ou escreve sua ideia 😉'; return; }
    if (!dataValida(data)) { erro.textContent = 'Confere a data (DD/MM) 😉'; return; }
    if (!horaValida(hora)) { erro.textContent = 'Coloca o horário (ex: 20:30) 😉'; return; }
    const lugar = temLugar ? localEscolhido : ideia;
    document.getElementById('mensagem').value =
      'Oii! Aceito o terceiro encontro 🥰\n\n' +
      '📍 Onde: ' + lugar + '\n' +
      '📅 Data: ' + data + '\n' +
      '🕐 Horário: ' + hora + '\n' +
      '\nTá marcado! mal posso esperar 😄💚';
    // fade reveal → sucesso
    const rv = document.getElementById('revealScreen');
    rv.style.transition = 'opacity .35s ease'; rv.style.opacity = '0';
    setTimeout(function(){
      rv.style.display = 'none';
      const su = document.getElementById('sucessoScreen');
      su.style.display = 'block'; su.style.opacity = '0';
      requestAnimationFrame(function(){ su.style.transition = 'opacity .5s ease'; su.style.opacity = '1'; });
      burstHearts(window.innerWidth / 2, window.innerHeight * 0.4, 28);
    }, 350);
  };

  window.copiarMsg = async function(){
    const txt = document.getElementById('mensagem').value;
    const btn = document.getElementById('btnCopiar');
    try { await navigator.clipboard.writeText(txt); }
    catch(e){ const c = document.getElementById('mensagem'); c.removeAttribute('readonly'); c.select(); document.execCommand('copy'); c.setAttribute('readonly', 'true'); }
    const o = btn.textContent; btn.textContent = '✅ copiado!'; setTimeout(function(){ btn.textContent = o; }, 2000);
  };

  // ---- tela 0: senha (a senha é "Daniela") ----
  window.checarSenha = function(){
    const inp = document.getElementById('senha');
    const erro = document.getElementById('senhaErro');
    if (inp.value.trim().toLowerCase() === 'daniela') {
      erro.textContent = '';
      bigHeart();
      // a "Dani" continua tocando pelo fluxo inteiro (música única)
      setTimeout(function(){
        document.getElementById('lockScreen').style.display = 'none';
        const ask = document.getElementById('askScreen');
        ask.style.display = 'block';
        ask.style.opacity = '0';
        requestAnimationFrame(function(){ ask.style.transition = 'opacity .5s ease'; ask.style.opacity = '1'; });
      }, 850);
    } else {
      erro.textContent = 'quase… 🎶 (completa a música com o seu nome 💗)';
      inp.classList.add('shake');
      setTimeout(function(){ inp.classList.remove('shake'); }, 500);
    }
  };

  // coração gigante que cresce e some, por cima de um estouro de corações
  function bigHeart(){
    const h = document.createElement('div');
    h.textContent = '💚';
    h.style.cssText = 'position:fixed;left:50%;top:50%;z-index:9;pointer-events:none;font-size:46px;filter:drop-shadow(0 0 20px rgba(120,220,120,.9));';
    document.body.appendChild(h);
    h.animate([
      { transform: 'translate(-50%,-50%) scale(.2)', opacity: 1 },
      { transform: 'translate(-50%,-50%) scale(11)', opacity: 0 }
    ], { duration: 850, easing: 'cubic-bezier(.2,.7,.3,1)' });
    setTimeout(function(){ h.remove(); }, 900);
    burstHearts(window.innerWidth / 2, window.innerHeight / 2, 26);
  }

  // ---- música: só a "Dani" (Biquini Cavadão), via YouTube ----
  // vários IDs: se um tiver embed desabilitado, tenta o próximo (onError)
  const DANI_TRACKS = ['lEIc002oJ0s', 'eRvi1nAPoOI', '55lGfJdX9HI', 'ZLppReXhxyQ'];
  const DANI_START = 32; // segundo onde começa o refrão "só penso nela…" (ajustável)
  let ytPlayer = null, ytReady = false, isMuted = false, querTocar = false, idx = 0;

  window.onYouTubeIframeAPIReady = function(){
    ytPlayer = new YT.Player('yt', {
      height: '0', width: '0', videoId: DANI_TRACKS[0],
      playerVars: { autoplay: 0, controls: 0, playsinline: 1, rel: 0, origin: location.origin },
      events: {
        onReady: function(){ ytReady = true; if (querTocar) play(); },
        onError: function(){ // 101/150 = embed off; 100 = removido → tenta o próximo
          idx++;
          if (idx < DANI_TRACKS.length) { ytPlayer.loadVideoById({ videoId: DANI_TRACKS[idx], startSeconds: DANI_START }); }
        }
      }
    });
  };
  function play(){
    querTocar = true;
    if (!ytReady || !ytPlayer) return;
    // começa direto no trecho "só penso nela…"
    ytPlayer.loadVideoById({ videoId: DANI_TRACKS[idx], startSeconds: DANI_START });
    if (isMuted) ytPlayer.mute(); else ytPlayer.unMute();
  }
  window.toggleMute = function(){
    isMuted = !isMuted;
    document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
    if (!ytPlayer) return;
    if (isMuted) ytPlayer.mute(); else { ytPlayer.unMute(); ytPlayer.playVideo(); }
  };
  // começa na primeira interação (clique/tecla)
  function primeiraMusica(){ play(); }
  document.addEventListener('pointerdown', primeiraMusica, { once: true });
  document.addEventListener('keydown', primeiraMusica, { once: true });
</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
