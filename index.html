<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenho uma pergunta importante...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            text-align: center;
            padding: 20px 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .gif-container img {
            width: 150px;
            margin-bottom: 20px;
            border-radius: 12px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 50px;
            align-items: center;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #btnSim {
            background-color: #4cc9f0;
            color: white;
        }
        #btnSim:hover {
            transform: scale(1.1);
            background-color: #4895ef;
        }
        #btnNao {
            background-color: #ff4d6d;
            color: white;
        }

        /* --- Formulário --- */
        #formulario, #sucesso { display: none; }

        .campo {
            text-align: left;
            margin-bottom: 20px;
        }
        .campo > label.titulo {
            display: block;
            font-weight: bold;
            color: #ff4d6d;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .opcao {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 15px;
            color: #333;
            cursor: pointer;
        }
        .opcao input { cursor: pointer; }
        .opcao.desabilitada {
            color: #bbb;
            cursor: not-allowed;
        }
        .opcao.desabilitada input { cursor: not-allowed; }

        /* Botões de local (mesma brincadeira do SIM/NÃO) */
        .locais {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .btn-local {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #d7f0fa;
            color: #2a8cad;
        }
        .btn-local:not(.selecionado):not(.fujao):hover {
            transform: scale(1.08);
            background-color: #bfe7f6;
        }
        .btn-local.selecionado {
            background-color: #4cc9f0;
            color: white;
        }
        .btn-local.selecionado:hover {
            transform: scale(1.08);
            background-color: #4895ef;
        }
        .btn-local.fujao {
            background-color: #ff4d6d;
            color: white;
        }

        input[type="text"], select {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            font-size: 15px;
            font-family: inherit;
            color: #333;
            border: 2px solid #ffd1da;
            border-radius: 12px;
            background: #fff;
        }
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #ff4d6d;
        }
        .erro {
            color: #e63e5c;
            font-size: 13px;
            min-height: 16px;
            margin-top: 6px;
            text-align: left;
        }

        #btnConfirmar {
            background-color: #ff4d6d;
            color: white;
            width: 100%;
        }
        #btnConfirmar:hover {
            transform: scale(1.03);
            background-color: #e63e5c;
        }

        /* --- Tela final --- */
        #mensagem {
            width: 100%;
            box-sizing: border-box;
            min-height: 130px;
            padding: 12px;
            font-size: 15px;
            font-family: inherit;
            color: #333;
            border: 2px solid #ffd1da;
            border-radius: 12px;
            resize: vertical;
            margin-bottom: 15px;
        }
        .acoes {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #btnCopiar { background-color: #ff4d6d; color: white; }
        #btnCopiar:hover { transform: scale(1.03); background-color: #e63e5c; }
        #btnWhats {
            display: inline-block;
            text-decoration: none;
            background-color: #25D366;
            color: white;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
        }
        #btnWhats:hover { transform: scale(1.03); background-color: #1fb457; }
        .dica { font-size: 13px; color: #888; margin-top: 14px; }
    </style>
</head>

            </div>

            <h1>Quer sair comigo para um encontro? 😊</h1>

            <div class="buttons">
                <button id="btnSim" onclick="aceitou()">SIM!</button>
                <button id="btnNao" onmouseover="fugir(this)" onclick="fugir(this)">NÃO</button>
            </div>
        </div>

        <!-- ETAPA 2: Formulário -->
        <div id="formulario">
            <h1>Aeee! 🥰 Agora me conta os detalhes 💕</h1>

            <!-- Local -->
            <div class="campo">
                <label class="titulo">📍 Onde vamos?</label>
                <div class="locais">
                    <button type="button" class="btn-local" data-local="Vale Sul" onclick="selecionarLocal(this)">Vale Sul</button>
                    <button type="button" class="btn-local fujao" onmouseover="fugir(this)" onclick="fugir(this)">Oriente</button>
                    <button type="button" class="btn-local fujao" onmouseover="fugir(this)" onclick="fugir(this)">CenterVale</button>
                </div>
                <div class="erro" id="erroLocal"></div>
            </div>

            <!-- Data -->
            <div class="campo">
                <label class="titulo" for="data">📅 Melhor data para a dama</label>
                <input type="text" id="data" inputmode="numeric" maxlength="5" placeholder="DD/MM" oninput="formatarData(this)">
                <div class="erro" id="erroData"></div>
            </div>

            <!-- Preferência -->
            <div class="campo">
                <label class="titulo" for="restaurante">🍽️ O que você prefere?</label>
                <select id="restaurante">
                    <option value="">Escolha uma opção...</option>
                    <option value="Italiano 🍝">Italiano 🍝</option>
                    <option value="Japonês 🍣">Japonês 🍣</option>
                    <option value="Hambúrguer 🍔">Hambúrguer 🍔</option>
                    <option value="Pizza 🍕">Pizza 🍕</option>
                    <option value="Churrasco / Rodízio 🥩">Churrasco / Rodízio 🥩</option>
                    <option value="Comida mexicana 🌮">Comida mexicana 🌮</option>
                    <option value="Doceria / Café ☕🍰">Doceria / Café ☕🍰</option>
                    <option value="Sorvete 🍦">Sorvete 🍦</option>
                    <option value="Humm: não sei rsrs 🤔">Humm: não sei rsrs 🤔</option>
                </select>
                <div class="erro" id="erroRest"></div>
            </div>

            <button id="btnConfirmar" onclick="confirmar()">Confirmar 💌</button>
        </div>

        <!-- ETAPA 3: Mensagem pronta -->
        <div id="sucesso">
            <h1>Prontinho! 🎉</h1>
            <p>Copie a mensagem abaixo e cole na nossa conversa 💬</p>

            <textarea id="mensagem" readonly></textarea>

            <div class="acoes">
                <button id="btnCopiar" onclick="copiarMensagem()">📋 Copiar mensagem</button>
            </div>

            <p class="dica">Depois de copiar, é só colar na conversa e enviar. 😉</p>
        </div>
    </div>

    <script>
        // Faz qualquer botão fugir para uma posição aleatória (usado no NÃO e nos locais)
        function fugir(btn) {
            const x = Math.random() * (window.innerWidth - btn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight - 50);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        // Só o Vale Sul deixa selecionar de verdade (começa sem nada marcado)
        let localEscolhido = '';
        function selecionarLocal(btn) {
            localEscolhido = btn.dataset.local;
            btn.classList.add('selecionado');
            btn.textContent = btn.dataset.local + ' ✓';
        }

        function aceitou() {
            document.getElementById('pergunta').style.display = 'none';
            document.getElementById('formulario').style.display = 'block';
        }

        // Coloca a "/" automaticamente e só aceita números
        function formatarData(campo) {
            let v = campo.value.replace(/\D/g, '');       // só dígitos
            if (v.length > 2) v = v.slice(0, 2) + '/' + v.slice(2, 4);
            campo.value = v;
        }

        // Confere se a data é válida no formato DD/MM
        function dataValida(str) {
            const m = str.match(/^(\d{2})\/(\d{2})$/);
            if (!m) return false;
            const dia = parseInt(m[1], 10);
            const mes = parseInt(m[2], 10);
            return dia >= 1 && dia <= 31 && mes >= 1 && mes <= 12;
        }

        function confirmar() {
            const data = document.getElementById('data').value.trim();
            const restaurante = document.getElementById('restaurante').value;
            const local = localEscolhido;

            const erroLocal = document.getElementById('erroLocal');
            const erroData = document.getElementById('erroData');
            const erroRest = document.getElementById('erroRest');
            erroLocal.textContent = '';
            erroData.textContent = '';
            erroRest.textContent = '';

            let ok = true;
            if (!localEscolhido) {
                erroLocal.textContent = 'Escolhe o local 😉';
                ok = false;
            }
            if (!dataValida(data)) {
                erroData.textContent = 'Coloca a data no formato DD/MM 😉';
                ok = false;
            }
            if (!restaurante) {
                erroRest.textContent = 'Escolhe uma opção pra eu já saber 😄';
                ok = false;
            }
            if (!ok) return;

            // Monta a mensagem com as respostas
            const texto =
                'Oiii! Aceito o convite! 🥰\n\n' +
                '📍 Local: ' + local + '\n' +
                '📅 Melhor data pra mim: ' + data + '\n' +
                '🍽️ Prefiro: ' + restaurante + '\n\n' +
                'Quando a gente marca? 💕';

            document.getElementById('mensagem').value = texto;
            document.getElementById('formulario').style.display = 'none';
            document.getElementById('sucesso').style.display = 'block';
        }

        async function copiarMensagem() {
            const texto = document.getElementById('mensagem').value;
            const btn = document.getElementById('btnCopiar');
            try {
                await navigator.clipboard.writeText(texto);
            } catch (e) {
                const campo = document.getElementById('mensagem');
                campo.removeAttribute('readonly');
                campo.select();
                document.execCommand('copy');
                campo.setAttribute('readonly', true);
            }
            const original = btn.textContent;
            btn.textContent = '✅ Copiado!';
            setTimeout(() => { btn.textContent = original; }, 2000);
        }
    </script>
